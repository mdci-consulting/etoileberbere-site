<p-toast></p-toast>
<div class="page-container">

  <h2 class="section-title">Contactez-moi</h2>
  <p class="contact-intro">N'hesitez pas a m'ecrire, je reponds rapidement !</p>

  <form [formGroup]="contactForm" (ngSubmit)="sendMessage()" class="contact-form" aria-label="Formulaire de contact">

    <div class="form-row">
      <!-- Nom -->
      <div class="form-group">
        <label for="name">Nom</label>
        <input id="name" type="text" formControlName="name" placeholder="Votre nom"
               aria-required="true"
               [attr.aria-invalid]="f['name'].touched && f['name'].invalid"
               aria-describedby="name-error" />
        <small *ngIf="f['name'].touched && f['name'].errors?.['required']" id="name-error" class="form-error">
          Le nom est requis.
        </small>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="Votre email"
               aria-required="true"
               [attr.aria-invalid]="f['email'].touched && f['email'].invalid"
               aria-describedby="email-error" />
        <small *ngIf="f['email'].touched && f['email'].errors?.['required']" id="email-error" class="form-error">
          L'email est requis.
        </small>
        <small *ngIf="f['email'].touched && f['email'].errors?.['email']" class="form-error">
          Veuillez entrer un email valide.
        </small>
      </div>
    </div>

    <!-- Sujet -->
    <div class="form-group">
      <label for="subject">Sujet</label>
      <input id="subject" type="text" formControlName="subject" placeholder="Votre sujet"
             aria-required="true"
             [attr.aria-invalid]="f['subject'].touched && f['subject'].invalid"
             aria-describedby="subject-error" />
      <small *ngIf="f['subject'].touched && f['subject'].errors?.['required']" id="subject-error" class="form-error">
        Le sujet est requis.
      </small>
    </div>

    <!-- Message -->
    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" formControlName="message" placeholder="Votre message" rows="6"
                aria-required="true"
                [attr.aria-invalid]="f['message'].touched && f['message'].invalid"
                aria-describedby="message-error"></textarea>
      <small *ngIf="f['message'].touched && f['message'].errors?.['required']" id="message-error" class="form-error">
        Le message est requis.
      </small>
    </div>

    <!-- Bouton -->
    <button type="submit" class="btn-primary" [disabled]="contactForm.invalid">
      <i class="pi pi-send"></i>
      Envoyer
    </button>

  </form>

</div>
