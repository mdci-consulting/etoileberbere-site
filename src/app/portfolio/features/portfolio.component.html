<div class="page-container">

  <h2 class="section-title">Mon Portfolio</h2>

  <p *ngIf="projects.length === 0" class="empty-state" role="alert">Aucun projet trouvé</p>

  <div *ngFor="let project of projects; let i = index" [id]="'project-' + project.id" class="card project-card" [class.selected]="i === selectedIndex">

    <div class="project-layout">
      <!-- VISUAL -->
      <div class="project-visual-wrapper">
        <app-tech-visual
          [technologies]="project.technologies"
          [projectIndex]="i"
          [label]="project.title">
        </app-tech-visual>
      </div>

      <!-- CONTENU -->
      <div class="project-content">
        <h3>{{ project.title }}</h3>
        <p>{{ project.description }}</p>

        <div *ngIf="project.descriptionDetails?.length" class="project-features">
          <p class="features-label">Fonctionnalités :</p>
          <ul>
            <li *ngFor="let detail of project.descriptionDetails">{{ detail }}</li>
          </ul>
        </div>

        <p class="tech-label"><strong>Technologies :</strong></p>
        <div class="tags-grid" role="list" aria-label="Technologies utilisées">
          <span *ngFor="let tech of project.technologies" class="tag" role="listitem">{{ tech }}</span>
        </div>

        <div class="project-action">
          <a [href]="project.link" target="_blank" rel="noopener noreferrer"
             class="btn-primary btn-success"
             [attr.aria-label]="'Voir le projet ' + project.title + ' (ouvre un nouvel onglet)'">
            <i class="pi pi-external-link"></i>
            Voir le projet
          </a>
        </div>
      </div>
    </div>

  </div>

</div>
